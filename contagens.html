<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventário • Contagens</title>
    <link rel="stylesheet" href="./style-contagens.css" />
  </head>
  <body>
    <main class="contagens-layout">
      <header class="contagens-header">
        <h1>Contagens</h1>
        <div class="header-actions">
          <button id="fullscreen-btn" class="btn">Tela cheia</button>
          <button id="exportar-contagens" class="btn primary">Exportar contagens</button>
        </div>
      </header>

      <section class="card">
        <div class="radio-group">
          <label><input type="radio" name="tipo-contagem" value="loja" checked /> Loja</label>
          <label><input type="radio" name="tipo-contagem" value="deposito" /> Depósito</label>
        </div>

        <div class="grid cols-3">
          <label class="field">
            <span>Corredor</span>
            <input type="text" id="corredor" placeholder="Ex.: A1" />
          </label>
          <label class="field">
            <span>Coluna</span>
            <select id="coluna"></select>
          </label>
          <label class="field">
            <span>Andar</span>
            <select id="andar"></select>
          </label>
        </div>

        <label class="field">
          <span>Digite o código ou nome do produto</span>
          <input type="text" id="codigo" placeholder="Código ou descrição" enterkeyhint="enter" />
        </label>

        <section id="resultado" class="resultado"></section>

        <div id="quantidade-bloco" class="grid cols-2 align-end">
          <label class="field">
            <span>Quantidade</span>
            <input type="number" id="quantidade" step="any" placeholder="Digite a quantidade" enterkeyhint="enter" />
          </label>
          <label class="qtde1-toggle">
            <input type="checkbox" id="qtde1" />
            <span>Qtde 1</span>
          </label>
        </div>

        <section id="ultimo-contado" class="ultimo-contado" hidden></section>
      </section>
    </main>

    <script type="module" src="./src/contagens-page.js"></script>
  </body>
</html>
